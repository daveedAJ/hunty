name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Vitest
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js app
        run: pnpm build

  # ── Visual Regression — Issue #664 ──────────────────────────────────────────
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install only the Chromium and WebKit browsers used in CI projects.
      # msedge is skipped because it is unavailable on ubuntu-latest.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      # Run only the visual-regression spec. The --project flags match the
      # project names defined in playwright.config.ts that are available on
      # Linux (chromium-desktop, mobile-chrome, mobile-safari).
      - name: Run visual regression tests
        run: |
          pnpm exec playwright test visual-regression \
            --project=chromium-desktop \
            --project=mobile-chrome \
            --project=mobile-safari
        env:
          CI: true

      # Upload the HTML report so reviewers can inspect diffs visually.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 30

      # Upload screenshot diffs when tests fail so the diff images are
      # available for review without having to re-run locally.
      - name: Upload screenshot diffs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-diffs
          path: test-results/
          retention-days: 14
  # ────────────────────────────────────────────────────────────────────────────
